# ============================================================
# BrainSAIT ML Inference — Workers AI + Vectorize + model serving
# ============================================================
name = "brainsait-ml-inference"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]
account_id = "87a79e73521fc85dab488b2c700554e3"

[env.production]
name = "brainsait-ml-inference-prod"
route = { pattern = "ml.brainsait.com/*", zone_name = "brainsait.com" }

[env.staging]
name = "brainsait-ml-inference-staging"
workers_dev = true

# ── KV ──
[[kv_namespaces]]
binding = "MODEL_CACHE"
id = "MODEL_CACHE_KV_ID"

[[kv_namespaces]]
binding = "INFERENCE_CACHE"
id = "INFERENCE_CACHE_KV_ID"

# ── R2 ──
[[r2_buckets]]
binding = "MODEL_STORE"
bucket_name = "brainsait-models"

[[r2_buckets]]
binding = "PREDICTION_LOGS"
bucket_name = "brainsait-predictions"

# ── Queues ──
[[queues.producers]]
binding = "BATCH_QUEUE"
queue = "brainsait-batch-inference"

# ── Durable Objects ──
[[durable_objects.bindings]]
name = "SESSION_CONTEXT"
class_name = "AISessionContext"

# ── Vectorize ──
[[vectorize]]
binding = "EMBEDDINGS"
index_name = "brainsait-embeddings"

[[vectorize]]
binding = "KNOWLEDGE_GRAPH"
index_name = "brainsait-knowledge"

# ── AI Gateway ──
[ai]
binding = "AI"

# ── Analytics ──
[[analytics_engine_datasets]]
binding = "ML_ANALYTICS"
dataset = "brainsait_ml_usage"

# ── Variables ──
[vars]
DEFAULT_MODEL = "@cf/meta/llama-3.1-8b-instruct"
EMBEDDING_MODEL = "@cf/baai/bge-base-en-v1.5"
MAX_BATCH_SIZE = "100"
INFERENCE_TIMEOUT_MS = "30000"
