# BrainSAIT Queue Consumers
name = "brainsait-queue-consumers"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]
account_id = "d7b99530559ab4f2545e9bdc72a7ab9b"

[env.production]
name = "brainsait-queue-consumers-prod"

[[queues.consumers]]
queue = "brainsait-claims"
max_batch_size = 10
max_batch_timeout = 5
max_retries = 3

[[queues.producers]]
binding = "NOTIFICATION_QUEUE"
queue = "brainsait-notifications"

[[d1_databases]]
binding = "DB"
database_name = "brainsait-metrics"
database_id = "7b66d89d-7846-4c75-b7f5-5ffd2ea62629"

[[kv_namespaces]]
binding = "DEAD_LETTER"
id = "8c0682e8e21b4703b46fd1c1a3487ec0"
