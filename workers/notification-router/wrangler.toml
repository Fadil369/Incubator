# BrainSAIT Notification Router — Multi-channel push
name = "brainsait-notification-router"
main = "src/index.ts"
compatibility_date = "2024-12-01"
account_id = "d7b99530559ab4f2545e9bdc72a7ab9b"

[env.production]
name = "brainsait-notifications-prod"
routes = [{ pattern = "notifications.brainsait.org", custom_domain = true, zone_name = "brainsait.org" }]

[env.production.vars]
MAX_RETRIES = "3"
RETRY_DELAY_MS = "5000"

[[env.production.kv_namespaces]]
binding = "CHANNEL_CONFIG"
id = "9503c6ef49a2447f9f3f65f8d0ce5bbf"

[[env.production.kv_namespaces]]
binding = "NOTIFICATION_LOG"
id = "079016c359c348e180724cdd76f29129"

[[env.production.d1_databases]]
binding = "DB"
database_name = "brainsait-metrics"
database_id = "7b66d89d-7846-4c75-b7f5-5ffd2ea62629"

[[env.production.queues.consumers]]
queue = "brainsait-notifications"
max_batch_size = 10
max_batch_timeout = 30
max_retries = 3
dead_letter_queue = "brainsait-notifications-dlq"

[[env.production.durable_objects.bindings]]
name = "WS_SESSIONS"
class_name = "WebSocketSession"

[[env.production.migrations]]
tag = "v1"
new_sqlite_classes = ["WebSocketSession"]

[env.staging]
name = "brainsait-notifications-staging"
workers_dev = true

[[kv_namespaces]]
binding = "CHANNEL_CONFIG"
id = "9503c6ef49a2447f9f3f65f8d0ce5bbf"

[[kv_namespaces]]
binding = "NOTIFICATION_LOG"
id = "079016c359c348e180724cdd76f29129"

[[d1_databases]]
binding = "DB"
database_name = "brainsait-metrics"
database_id = "7b66d89d-7846-4c75-b7f5-5ffd2ea62629"

[[queues.consumers]]
queue = "brainsait-notifications"
max_batch_size = 10
max_batch_timeout = 30
max_retries = 3

[[durable_objects.bindings]]
name = "WS_SESSIONS"
class_name = "WebSocketSession"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["WebSocketSession"]

[vars]
MAX_RETRIES = "3"
RETRY_DELAY_MS = "5000"
