# ============================================================
# BrainSAIT Data Hub Proxy — GraphQL proxy for Hasura + caching
# ============================================================
name = "brainsait-data-hub-proxy"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]
account_id = "87a79e73521fc85dab488b2c700554e3"

[env.production]
name = "brainsait-data-hub-prod"
route = { pattern = "data-hub.brainsait.com/*", zone_name = "brainsait.com" }

[env.staging]
name = "brainsait-data-hub-staging"
workers_dev = true

# ── KV ──
[[kv_namespaces]]
binding = "SCHEMA_CACHE"
id = "SCHEMA_CACHE_KV_ID"

[[kv_namespaces]]
binding = "CONTRACT_REGISTRY"
id = "CONTRACT_REGISTRY_KV_ID"

[[kv_namespaces]]
binding = "SUBSCRIPTION_MAP"
id = "SUBSCRIPTION_MAP_KV_ID"

# ── D1 ──
[[d1_databases]]
binding = "DB"
database_name = "brainsait-data-hub"
database_id = "DATA_HUB_D1_ID"

# ── R2 ──
[[r2_buckets]]
binding = "DATA_STORE"
bucket_name = "brainsait-data-store"

[[r2_buckets]]
binding = "CONTRACT_FILES"
bucket_name = "brainsait-contracts"

# ── Queues ──
[[queues.producers]]
binding = "DATA_SYNC_QUEUE"
queue = "brainsait-data-sync"

[[queues.producers]]
binding = "NOTIFICATION_QUEUE"
queue = "brainsait-notifications"

# ── Analytics ──
[[analytics_engine_datasets]]
binding = "DATA_ANALYTICS"
dataset = "brainsait_data_usage"

# ── Variables ──
[vars]
HASURA_URL = "https://hasura.brainsait.com"
CACHE_TTL = "300"
MAX_QUERY_DEPTH = "10"
