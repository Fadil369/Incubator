# ============================================================
# BrainSAIT — Startup Provisioning Workflow
#
# Triggered after a partner completes onboarding via the portal.
# Provisions GitHub repositories from templates, registers the
# startup in the incubator registry, and notifies the team.
#
# Trigger: repository_dispatch with event_type: startup_onboarded
# or manually via workflow_dispatch.
# ============================================================
name: "🚀 Startup Provisioning"

on:
  repository_dispatch:
    types: [startup_onboarded]
  workflow_dispatch:
    inputs:
      startup_slug:
        description: 'Startup slug (e.g. dentalai)'
        required: true
      organization:
        description: 'Organization / company name'
        required: true
      partner_type:
        description: 'Partner type (tech|health|dist|integ)'
        required: false
        default: 'tech'
      contact_email:
        description: 'Contact email for notifications'
        required: false
      reference_id:
        description: 'Partner application reference ID'
        required: false

permissions:
  contents: read

env:
  GITHUB_ORG: ${{ secrets.GITHUB_ORG || 'brainsait-incubator' }}
  GH_TOKEN: ${{ secrets.GH_PAT }}

jobs:
  # ─────────────────────────────────────────────────────────────
  # Resolve inputs from either trigger source
  # ─────────────────────────────────────────────────────────────
  resolve-inputs:
    name: "📋 Resolve Inputs"
    runs-on: ubuntu-latest
    outputs:
      startup_slug: ${{ steps.resolve.outputs.startup_slug }}
      organization:  ${{ steps.resolve.outputs.organization }}
      partner_type:  ${{ steps.resolve.outputs.partner_type }}
      contact_email: ${{ steps.resolve.outputs.contact_email }}
      reference_id:  ${{ steps.resolve.outputs.reference_id }}
    steps:
      - name: Resolve inputs
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            SLUG="${{ github.event.client_payload.startup_slug }}"
            ORG="${{ github.event.client_payload.organization }}"
            PTYPE="${{ github.event.client_payload.partner_type }}"
            EMAIL="${{ github.event.client_payload.contact_email }}"
            REF="${{ github.event.client_payload.reference_id }}"
          else
            SLUG="${{ github.event.inputs.startup_slug }}"
            ORG="${{ github.event.inputs.organization }}"
            PTYPE="${{ github.event.inputs.partner_type }}"
            EMAIL="${{ github.event.inputs.contact_email }}"
            REF="${{ github.event.inputs.reference_id }}"
          fi

          # Sanitize slug: lowercase, only alphanumeric + hyphen
          SLUG=$(echo "$SLUG" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9-]/-/g' | sed 's/--*/-/g' | sed 's/^-//;s/-$//')

          if [ -z "$SLUG" ]; then
            echo "Error: startup_slug is empty after sanitization. Provide a value containing at least one alphanumeric character."
            exit 1
          fi

          echo "startup_slug=$SLUG"     >> $GITHUB_OUTPUT
          echo "organization=$ORG"      >> $GITHUB_OUTPUT
          echo "partner_type=${PTYPE:-tech}" >> $GITHUB_OUTPUT
          echo "contact_email=$EMAIL"   >> $GITHUB_OUTPUT
          echo "reference_id=$REF"      >> $GITHUB_OUTPUT

          echo "Provisioning startup: $SLUG ($ORG)"

  # ─────────────────────────────────────────────────────────────
  # Create GitHub repositories from templates
  # ─────────────────────────────────────────────────────────────
  provision-repos:
    name: "🗂️ Provision GitHub Repos"
    runs-on: ubuntu-latest
    needs: resolve-inputs
    outputs:
      repos_created: ${{ steps.create.outputs.repos_created }}
    steps:
      - name: Check if repos already exist
        id: check
        env:
          SLUG: ${{ needs.resolve-inputs.outputs.startup_slug }}
        run: |
          EXISTS=$(gh api --paginate "orgs/${GITHUB_ORG}/repos" --jq '[.[] | select(.name | startswith("'"$SLUG"'"))] | length' 2>/dev/null || echo "0")
          echo "existing_count=$EXISTS" >> $GITHUB_OUTPUT
          if [ "$EXISTS" -gt "0" ]; then
            echo "Repos already exist for $SLUG ($EXISTS repos). Skipping creation."
          fi

      - name: Create platform repo from template
        id: create
        if: steps.check.outputs.existing_count == '0'
        env:
          SLUG: ${{ needs.resolve-inputs.outputs.startup_slug }}
          ORG: ${{ needs.resolve-inputs.outputs.organization }}
          PTYPE: ${{ needs.resolve-inputs.outputs.partner_type }}
        run: |
          REPOS_CREATED=""

          # Helper: create repo from template (or plain) if it does not yet exist
          create_repo() {
            local REPO_NAME="$1"
            local TEMPLATE_OWNER="$2"
            local TEMPLATE_REPO="$3"
            local DESCRIPTION="$4"

            if gh api "repos/${GITHUB_ORG}/${REPO_NAME}" --silent 2>/dev/null; then
              echo "  → $REPO_NAME already exists, skipping"
              return 0
            fi

            # Try template generation first
            if [ -n "$TEMPLATE_REPO" ]; then
              RESPONSE=$(gh api "repos/${TEMPLATE_OWNER}/${TEMPLATE_REPO}/generate" \
                -X POST \
                -f owner="$GITHUB_ORG" \
                -f name="$REPO_NAME" \
                -f description="$DESCRIPTION" \
                -f private=true \
                -f include_all_branches=false \
                2>&1) && {
                echo "  ✅ $REPO_NAME created from template ${TEMPLATE_OWNER}/${TEMPLATE_REPO}"
                REPOS_CREATED="${REPOS_CREATED} ${REPO_NAME}"
                return 0
              }
            fi

            # Fallback: plain repo
            gh api "orgs/${GITHUB_ORG}/repos" \
              -X POST \
              -f name="$REPO_NAME" \
              -f description="$DESCRIPTION" \
              -f private=true \
              -f auto_init=true \
              && echo "  ✅ $REPO_NAME created (plain)" \
              && REPOS_CREATED="${REPOS_CREATED} ${REPO_NAME}" \
              || echo "  ⚠️ Could not create $REPO_NAME"
          }

          echo "🔨 Creating repos for startup: $SLUG"

          # Core repos (template names are illustrative; adjust to actual templates in your org)
          create_repo "${SLUG}-platform"  "$GITHUB_ORG" "brainsait-platform-template" \
            "${ORG} — Main platform (Next.js + Cloudflare Workers)"

          create_repo "${SLUG}-api"       "$GITHUB_ORG" "brainsait-api-template" \
            "${ORG} — Backend API (Hono + Cloudflare Workers)"

          create_repo "${SLUG}-infra"     "$GITHUB_ORG" "brainsait-infra-template" \
            "${ORG} — Infrastructure & IaC (Terraform/Wrangler)"

          create_repo "${SLUG}-docs"      "$GITHUB_ORG" "brainsait-docs-template" \
            "${ORG} — Documentation & guides"

          echo "repos_created=${REPOS_CREATED# }" >> $GITHUB_OUTPUT

      - name: Add CI/CD workflow label to new repos
        if: steps.create.outputs.repos_created != ''
        env:
          SLUG: ${{ needs.resolve-inputs.outputs.startup_slug }}
        run: |
          for SUFFIX in platform api infra docs; do
            REPO="${SLUG}-${SUFFIX}"
            gh api "repos/${GITHUB_ORG}/${REPO}/labels" \
              -X POST \
              -f name="ci-enabled" \
              -f color="0075ca" \
              -f description="CI/CD pipeline enabled" \
              2>/dev/null || true
          done

  # ─────────────────────────────────────────────────────────────
  # Provision Cloudflare resources via Wrangler
  # ─────────────────────────────────────────────────────────────
  provision-cloudflare:
    name: "☁️ Provision Cloudflare Resources"
    runs-on: ubuntu-latest
    needs: resolve-inputs
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wrangler
        run: npm install -g wrangler@3

      - name: Create KV namespace for startup
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          SLUG: ${{ needs.resolve-inputs.outputs.startup_slug }}
        run: |
          NS_NAME="startup-${SLUG}-sessions"
          echo "Creating KV namespace: $NS_NAME"
          RESULT=$(wrangler kv:namespace create "$NS_NAME" 2>&1) && \
            echo "✅ KV namespace created: $RESULT" || \
            echo "⚠️ KV namespace may already exist or Wrangler not configured: $RESULT"

      - name: Register startup in R2 bucket
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          SLUG: ${{ needs.resolve-inputs.outputs.startup_slug }}
        run: |
          # Use Cloudflare API to register the startup's prefix in the shared documents bucket
          echo "Registering startup $SLUG prefix in R2..."
          curl -s -X PUT \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/r2/buckets/brainsait-documents/objects/${SLUG}/.keep" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: text/plain" \
            --data "" && echo "✅ R2 prefix registered" || echo "⚠️ R2 registration skipped (will be created on first use)"

      - name: Update startup registry in KV
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          SLUG: ${{ needs.resolve-inputs.outputs.startup_slug }}
          ORG: ${{ needs.resolve-inputs.outputs.organization }}
          PTYPE: ${{ needs.resolve-inputs.outputs.partner_type }}
          REF: ${{ needs.resolve-inputs.outputs.reference_id }}
        run: |
          REGISTRY_KV_ID="${{ secrets.STARTUP_REGISTRY_KV_ID }}"
          if [ -z "$REGISTRY_KV_ID" ]; then
            echo "⚠️ STARTUP_REGISTRY_KV_ID not set — skipping registry update"
            exit 0
          fi

          PAYLOAD=$(cat <<EOF
          {
            "slug": "$SLUG",
            "organization": "$ORG",
            "partnerType": "$PTYPE",
            "referenceId": "$REF",
            "provisionedAt": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "status": "provisioned"
          }
          EOF
          )

          curl -s -X PUT \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/storage/kv/namespaces/${REGISTRY_KV_ID}/values/startup:${SLUG}" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data "$PAYLOAD" && echo "✅ Registry updated for $SLUG" || echo "⚠️ Registry update failed"

  # ─────────────────────────────────────────────────────────────
  # Trigger the incubator CI/CD pipeline on the new platform repo
  # ─────────────────────────────────────────────────────────────
  trigger-ci:
    name: "⚙️ Trigger Initial CI"
    runs-on: ubuntu-latest
    needs: [provision-repos, resolve-inputs]
    if: needs.provision-repos.outputs.repos_created != ''
    steps:
      - name: Dispatch workflow on new platform repo
        env:
          SLUG: ${{ needs.resolve-inputs.outputs.startup_slug }}
        run: |
          REPO="${SLUG}-platform"
          TARGET_WORKFLOW_FILE="ci.yml"
          echo "Dispatching initial CI on ${GITHUB_ORG}/${REPO} using ${TARGET_WORKFLOW_FILE}..."
          gh api "repos/${GITHUB_ORG}/${REPO}/actions/workflows/${TARGET_WORKFLOW_FILE}/dispatches" \
            -X POST -f ref=main 2>/dev/null && echo "✅ CI dispatched" || echo "ℹ️ Target workflow not found or not ready yet"

  # ─────────────────────────────────────────────────────────────
  # Notify team and update dashboard
  # ─────────────────────────────────────────────────────────────
  notify:
    name: "📢 Notify Team"
    runs-on: ubuntu-latest
    needs: [provision-repos, provision-cloudflare, resolve-inputs]
    if: always()
    steps:
      - name: Create onboarding issue in incubator repo
        env:
          SLUG: ${{ needs.resolve-inputs.outputs.startup_slug }}
          ORG: ${{ needs.resolve-inputs.outputs.organization }}
          PTYPE: ${{ needs.resolve-inputs.outputs.partner_type }}
          REF: ${{ needs.resolve-inputs.outputs.reference_id }}
          EMAIL: ${{ needs.resolve-inputs.outputs.contact_email }}
        run: |
          REPOS_STATUS="${{ needs.provision-repos.result }}"
          CF_STATUS="${{ needs.provision-cloudflare.result }}"

          BODY=$(cat <<EOF
          ## 🎉 New Startup Onboarded: ${ORG}

          | Field | Value |
          |-------|-------|
          | Slug | \`${SLUG}\` |
          | Organization | ${ORG} |
          | Partner Type | ${PTYPE} |
          | Reference | \`${REF}\` |
          | Contact | ${EMAIL:-N/A} |
          | GitHub Repos | ${REPOS_STATUS} |
          | Cloudflare | ${CF_STATUS} |
          | Provisioned | $(date -u +%Y-%m-%d) |

          ### Resources Created
          - GitHub: [\`${SLUG}-platform\`](https://github.com/${GITHUB_ORG}/${SLUG}-platform)
          - GitHub: [\`${SLUG}-api\`](https://github.com/${GITHUB_ORG}/${SLUG}-api)
          - GitHub: [\`${SLUG}-infra\`](https://github.com/${GITHUB_ORG}/${SLUG}-infra)
          - GitHub: [\`${SLUG}-docs\`](https://github.com/${GITHUB_ORG}/${SLUG}-docs)
          - Cloudflare KV: \`startup-${SLUG}-sessions\`
          - R2 prefix: \`${SLUG}/\`

          ### Next Steps
          - [ ] Assign dedicated mentor
          - [ ] Schedule kick-off call
          - [ ] Review initial CI/CD results
          - [ ] Share resource access credentials

          _This issue was auto-generated by the partner-provision workflow._
          EOF
          )

          gh issue create \
            --repo "${{ github.repository }}" \
            --title "🚀 Onboarding: ${ORG} (${SLUG})" \
            --body "$BODY" \
            --label "type:feature" \
            2>/dev/null || echo "⚠️ Could not create issue (check GH_PAT permissions)"

      - name: Notify via Slack / Communication Hub
        env:
          COMM_HUB_TOKEN: ${{ secrets.COMM_HUB_TOKEN }}
          SLUG: ${{ needs.resolve-inputs.outputs.startup_slug }}
          ORG: ${{ needs.resolve-inputs.outputs.organization }}
        run: |
          if [ -z "$COMM_HUB_TOKEN" ]; then
            echo "ℹ️ COMM_HUB_TOKEN not set — skipping notification"
            exit 0
          fi
          curl -sSf -X POST \
            -H "Authorization: Bearer $COMM_HUB_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"type\":\"startup_provisioned\",\"slug\":\"$SLUG\",\"organization\":\"$ORG\",\"run_url\":\"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
            "https://comm-hub.brainsait.dev/api/v1/events" || true
