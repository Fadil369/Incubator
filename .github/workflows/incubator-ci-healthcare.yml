# ============================================================
# BrainSAIT Incubator — Healthcare AI CI/CD Pipeline
# HIPAA-compliant, multi-stage, with security gates
# ============================================================
name: "🏥 Healthcare CI/CD Pipeline"

on:
  push:
    branches: [main, develop, 'release/**']
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      deploy_target:
        description: 'Deployment target'
        required: false
        default: 'staging'
        type: choice
        options: [staging, production, sandbox]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  REGISTRY: ghcr.io
  ORG: ${{ github.repository_owner }}
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.12'

permissions:
  contents: read
  packages: write
  security-events: write
  id-token: write

jobs:
  # ─────────────────────────────────────────────────────
  # Stage 1: Build & Test
  # ─────────────────────────────────────────────────────
  build:
    name: "🔨 Build & Test"
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      has_python: ${{ steps.detect.outputs.has_python }}
      has_node: ${{ steps.detect.outputs.has_node }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect stack
        id: detect
        run: |
          echo "has_python=$(test -f requirements.txt || test -f pyproject.toml && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "has_node=$(test -f package.json && echo true || echo false)" >> $GITHUB_OUTPUT

      # ── Node.js ──
      - name: Setup Node.js
        if: steps.detect.outputs.has_node == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install & Test (Node)
        if: steps.detect.outputs.has_node == 'true'
        run: |
          npm ci
          npm run lint --if-present
          npm run test --if-present
          npm run build --if-present

      # ── Python ──
      - name: Setup Python
        if: steps.detect.outputs.has_python == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install & Test (Python)
        if: steps.detect.outputs.has_python == 'true'
        run: |
          pip install -r requirements.txt 2>/dev/null || pip install -e ".[dev]" 2>/dev/null || true
          pip install pytest pytest-cov
          python -m pytest --cov=. --cov-report=xml -q 2>/dev/null || echo "::warning::No tests found or tests failed"

      # ── Docker ──
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.ORG }}/${{ github.event.repository.name }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────
  # Stage 2: Security Scanning (HIPAA Gate)
  # ─────────────────────────────────────────────────────
  security:
    name: "🔒 Security Scan"
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
        continue-on-error: true

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
        if: always()

      - name: CodeQL Analysis
        uses: github/codeql-action/init@v3
        with:
          languages: javascript,python
        if: always()

      - name: Run CodeQL
        uses: github/codeql-action/analyze@v3
        if: always()

      - name: Secret Scanning (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: HIPAA Compliance Check
        run: |
          echo "🔍 Running HIPAA compliance checks..."
          # Check for PII patterns
          grep -rn "SSN\|social.security\|date.of.birth\|patient.id\|medical.record" \
            --include="*.js" --include="*.ts" --include="*.py" \
            --include="*.json" --include="*.yaml" --include="*.yml" \
            . 2>/dev/null && \
            echo "::error::Potential PII detected in codebase" || \
            echo "✅ No obvious PII patterns found"

          # Check for PHI logging
          grep -rn "console.log\|print(\|logger.*debug" \
            --include="*.js" --include="*.ts" --include="*.py" \
            . 2>/dev/null | \
            grep -i "patient\|diagnosis\|treatment\|medication" && \
            echo "::error::Potential PHI in logs" || \
            echo "✅ No PHI in logging detected"

  # ─────────────────────────────────────────────────────
  # Stage 3: Data Sync & Sharing
  # ─────────────────────────────────────────────────────
  data-sync:
    name: "📊 Data Sync"
    runs-on: ubuntu-latest
    needs: [build, security]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Sync to Data Hub
        env:
          DATA_HUB_TOKEN: ${{ secrets.DATA_HUB_TOKEN }}
          STARTUP_SLUG: ${{ github.event.repository.name }}
        run: |
          echo "📤 Syncing data schemas to incubator data hub..."
          # Export API schemas
          if [ -f "openapi.yaml" ] || [ -f "swagger.yaml" ]; then
            curl -sS -X POST \
              -H "Authorization: Bearer $DATA_HUB_TOKEN" \
              -H "Content-Type: application/yaml" \
              --data-binary @openapi.yaml \
              "https://data-hub.brainsait.dev/api/v1/schemas/${STARTUP_SLUG}" \
              && echo "✅ Schema synced" || echo "⚠️ Schema sync failed"
          fi

          # Sync data contracts
          if [ -d "data-contracts" ]; then
            find data-contracts -name "*.json" -o -name "*.yaml" | while read -r f; do
              echo "  → Syncing: $f"
              curl -sS -X POST \
                -H "Authorization: Bearer $DATA_HUB_TOKEN" \
                -F "file=@$f" \
                "https://data-hub.brainsait.dev/api/v1/contracts/${STARTUP_SLUG}" \
                || true
            done
          fi

      - name: Update Incubator Dashboard
        env:
          DASHBOARD_TOKEN: ${{ secrets.DASHBOARD_TOKEN }}
        run: |
          curl -sS -X POST \
            -H "Authorization: Bearer $DASHBOARD_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"repo\":\"${{ github.repository }}\",\"status\":\"${{ job.status }}\",\"sha\":\"${{ github.sha }}\",\"ref\":\"${{ github.ref }}\"}" \
            "https://dashboard.brainsait.dev/api/v1/build-events" \
            || echo "⚠️ Dashboard update failed"

  # ─────────────────────────────────────────────────────
  # Stage 4: Deploy
  # ─────────────────────────────────────────────────────
  deploy:
    name: "🚀 Deploy"
    runs-on: ubuntu-latest
    needs: [build, security, data-sync]
    if: github.ref == 'refs/heads/main' || github.event.inputs.deploy_target
    environment:
      name: ${{ github.event.inputs.deploy_target || 'staging' }}
      url: https://${{ github.event.repository.name }}.staging.brainsait.dev
    steps:
      - uses: actions/checkout@v4

      - name: Configure kubectl
        uses: azure/k8s-set-context@v4
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG }}

      - name: Deploy to K8s
        run: |
          export IMAGE_TAG="${{ github.sha }}"
          export STARTUP="${{ github.event.repository.name }}"
          export ENVIRONMENT="${{ github.event.inputs.deploy_target || 'staging' }}"

          # Apply manifests
          if [ -d "k8s/${ENVIRONMENT}" ]; then
            kubectl apply -k "k8s/${ENVIRONMENT}/"
          elif [ -d "k8s" ]; then
            kubectl apply -k k8s/
          fi

          # Rolling update (--record removed: deprecated in k8s 1.28+, use annotations instead)
          kubectl set image deployment/${STARTUP} \
            ${STARTUP}=${{ env.REGISTRY }}/${{ env.ORG }}/${STARTUP}:${IMAGE_TAG} \
            -n brainsait-${ENVIRONMENT}

          # Annotate with commit SHA for change tracking (replaces --record)
          kubectl annotate deployment/${STARTUP} \
            kubernetes.io/change-cause="${{ github.sha }}" \
            -n brainsait-${ENVIRONMENT} --overwrite

          kubectl rollout status deployment/${STARTUP} \
            -n brainsait-${ENVIRONMENT} --timeout=300s

      - name: Notify
        if: always()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        run: |
          STATUS="${{ job.status }}"
          REPO="${{ github.repository }}"
          SHA="${{ github.sha }}"
          curl -sS -X POST "$SLACK_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{\"text\":\"${STATUS}: ${REPO} (${SHA:0:7}) deployed to ${{ github.event.inputs.deploy_target || 'staging' }}\"}" \
            || true

  # ─────────────────────────────────────────────────────
  # Stage 5: Notification & Reporting
  # ─────────────────────────────────────────────────────
  notify:
    name: "📢 Notify"
    runs-on: ubuntu-latest
    needs: [build, security, deploy]
    if: always() && needs.build.result != 'skipped'
    steps:
      - name: Dispatch to Communication Hub
        env:
          COMM_HUB_TOKEN: ${{ secrets.COMM_HUB_TOKEN }}
        run: |
          PAYLOAD=$(cat <<EOF
          {
            "event": "pipeline_complete",
            "repo": "${{ github.repository }}",
            "status": "${{ needs.build.result == 'success' && needs.security.result == 'success' && (needs.deploy.result == 'success' || needs.deploy.result == 'skipped') && 'success' || 'failure' }}",
            "sha": "${{ github.sha }}",
            "ref": "${{ github.ref }}",
            "actor": "${{ github.actor }}",
            "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          }
          EOF
          )
          curl -sS -X POST \
            -H "Authorization: Bearer $COMM_HUB_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "https://comm-hub.brainsait.dev/api/v1/events" \
            || echo "⚠️ Notification dispatch failed"
