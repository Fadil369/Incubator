name: Deploy to Cloudflare

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Cloudflare environment for manual deployments'
        required: true
        type: choice
        default: staging
        options:
          - staging
          - production
      deploy_frontend:
        description: 'Deploy the frontend Pages project'
        required: false
        type: boolean
        default: true
      deploy_backend:
        description: 'Deploy the backend worker'
        required: false
        type: boolean
        default: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    name: Lint & Test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint:cf

      - name: Test
        run: npm run test:cf

  deploy-frontend:
    runs-on: ubuntu-latest
    name: Deploy Frontend to Cloudflare Pages
    needs: [lint-and-test]
    if: (github.event_name == 'workflow_dispatch' && inputs.deploy_frontend) || (github.event_name == 'push' && (github.ref == format('refs/heads/{0}', github.event.repository.default_branch) || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/production'))
    outputs:
      deploy_environment: ${{ steps.resolve-environment.outputs.deploy_environment }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Resolve deploy environment
        id: resolve-environment
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "deploy_environment=${{ inputs.environment }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.ref }}" = "refs/heads/main" ] || [ "${{ github.ref }}" = "refs/heads/production" ]; then
            echo "deploy_environment=production" >> "$GITHUB_OUTPUT"
          else
            echo "deploy_environment=staging" >> "$GITHUB_OUTPUT"
          fi

      - name: Build frontend
        run: npm run build:frontend
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.API_URL }}
          NEXT_PUBLIC_FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
          NEXT_PUBLIC_GITHUB_ORG: ${{ secrets.GITHUB_ORG }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: brainsait-frontend
          directory: packages/brainsait-frontend/out
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ steps.resolve-environment.outputs.deploy_environment == 'production' && github.event.repository.default_branch || github.ref_name }}

  deploy-backend:
    runs-on: ubuntu-latest
    name: Deploy Backend to Cloudflare Workers
    needs: [lint-and-test]
    if: (github.event_name == 'workflow_dispatch' && inputs.deploy_backend) || (github.event_name == 'push' && (github.ref == format('refs/heads/{0}', github.event.repository.default_branch) || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/production'))
    outputs:
      deploy_environment: ${{ steps.resolve-environment.outputs.deploy_environment }}
      deployment_url: ${{ steps.deploy.outputs.deployment-url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Resolve deploy environment
        id: resolve-environment
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "deploy_environment=${{ inputs.environment }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.ref }}" = "refs/heads/main" ] || [ "${{ github.ref }}" = "refs/heads/production" ]; then
            echo "deploy_environment=production" >> "$GITHUB_OUTPUT"
          else
            echo "deploy_environment=staging" >> "$GITHUB_OUTPUT"
          fi

      - name: Build backend
        run: npm run build:backend

      - name: Deploy to Cloudflare Workers
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: packages/brainsait-backend
          environment: ${{ steps.resolve-environment.outputs.deploy_environment }}
          secrets: |
            JWT_SECRET
            SENDGRID_API_KEY
            ANTHROPIC_API_KEY
            OPENAI_API_KEY
            CLAUDE_API_KEY
            REDIS_URL
            EMAIL_API_KEY
            SAUDI_GOV_API_KEY
            ADMIN_KEY
            GITHUB_TOKEN
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          EMAIL_API_KEY: ${{ secrets.EMAIL_API_KEY }}
          SAUDI_GOV_API_KEY: ${{ secrets.SAUDI_GOV_API_KEY }}
          ADMIN_KEY: ${{ secrets.ADMIN_KEY }}
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}

  health-check:
    runs-on: ubuntu-latest
    name: Health Check
    needs: [deploy-frontend, deploy-backend]
    if: always() && !cancelled() && (needs.deploy-frontend.result == 'success' || needs.deploy-backend.result == 'success')

    steps:
      - name: Check Frontend Health
        if: needs.deploy-frontend.result == 'success' && needs.deploy-frontend.outputs.deploy_environment == 'production'
        run: |
          curl --retry 3 --retry-delay 5 --retry-connrefused -f https://brainsait.org || exit 1

      - name: Check Backend Health
        if: needs.deploy-backend.result == 'success'
        env:
          BACKEND_HEALTH_URL: ${{ needs.deploy-backend.outputs.deployment_url && format('{0}/api/v1/health', needs.deploy-backend.outputs.deployment_url) || (needs.deploy-backend.outputs.deploy_environment == 'production' && 'https://api.brainsait.org/api/v1/health' || 'https://staging-api.brainsait.org/api/v1/health') }}
        run: |
          curl --retry 3 --retry-delay 5 --retry-connrefused -f "$BACKEND_HEALTH_URL" || exit 1

      - name: Notify Success
        if: success()
        run: echo "Selected Cloudflare services deployed successfully!"

      - name: Notify Failure
        if: failure()
        run: echo "Deployment health check failed!"