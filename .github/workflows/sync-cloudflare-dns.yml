name: Sync Cloudflare DNS

on:
  push:
    paths:
      - .github/workflows/sync-cloudflare-dns.yml
      - scripts/upsert-cloudflare-dns.sh
  workflow_dispatch:
    inputs:
      hostname:
        description: DNS hostname to create or update
        required: true
        default: staging-api.brainsait.org
        type: string
      record_type:
        description: DNS record type
        required: true
        default: A
        type: string
      record_content:
        description: DNS record content
        required: true
        default: 192.0.2.1
        type: string
      proxied:
        description: Whether to proxy the record through Cloudflare
        required: true
        default: true
        type: boolean

jobs:
  upsert-dns:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Upsert Cloudflare DNS record
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ZONE_NAME: brainsait.org
          HOSTNAME: ${{ github.event_name == 'workflow_dispatch' && inputs.hostname || 'staging-api.brainsait.org' }}
          RECORD_TYPE: ${{ github.event_name == 'workflow_dispatch' && inputs.record_type || 'A' }}
          RECORD_CONTENT: ${{ github.event_name == 'workflow_dispatch' && inputs.record_content || '192.0.2.1' }}
          PROXIED: ${{ github.event_name == 'workflow_dispatch' && inputs.proxied || 'true' }}
        run: bash scripts/upsert-cloudflare-dns.sh