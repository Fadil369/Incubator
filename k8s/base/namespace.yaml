apiVersion: v1
kind: Namespace
metadata:
  name: brainsait
  labels:
    app.kubernetes.io/part-of: brainsait-incubator
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
---
apiVersion: v1
kind: Namespace
metadata:
  name: brainsait-staging
  labels:
    app.kubernetes.io/part-of: brainsait-incubator
    environment: staging
    pod-security.kubernetes.io/enforce: restricted
---
apiVersion: v1
kind: Namespace
metadata:
  name: brainsait-production
  labels:
    app.kubernetes.io/part-of: brainsait-incubator
    environment: production
    pod-security.kubernetes.io/enforce: restricted
