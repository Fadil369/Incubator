# ============================================================
# BrainSAIT Backend — Cloudflare Workers Configuration
# Main API gateway worker with full CF resource bindings
# ============================================================
name = "brainsait-backend"
main = "packages/brainsait-backend/dist/worker.js"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]
account_id = "87a79e73521fc85dab488b2c700554e3"

# ── Routes ──
[env.production]
name = "brainsait-backend-production"
route = { pattern = "api.brainsait.com/*", zone_name = "brainsait.com" }

[env.staging]
name = "brainsait-backend-staging"
route = { pattern = "staging-api.brainsait.com/*", zone_name = "brainsait.com" }

[env.preview]
name = "brainsait-backend-preview"
workers_dev = true

# ── KV Namespaces ──
[[kv_namespaces]]
binding = "SESSIONS"
id = "394268b352c24c28868a33aad89f991c"

[[kv_namespaces]]
binding = "CACHE"
id = "b2f1b780fc1b4388aa9fd2b27ca58bf1"

[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "1d749622e39241ca8129407a96e1e111"

[[kv_namespaces]]
binding = "CONFIG"
id = "4acc7168b5cc492da85b93bdde4f4b32"

[[kv_namespaces]]
binding = "FEATURE_FLAGS"
id = "FEATURE_FLAGS_KV_ID"

[[kv_namespaces]]
binding = "STARTUP_REGISTRY"
id = "STARTUP_REGISTRY_KV_ID"

# ── D1 Databases ──
[[d1_databases]]
binding = "DB"
database_name = "brainsait-prod"
database_id = "D1_DATABASE_ID"

[[d1_databases]]
binding = "AUDIT_LOG"
database_name = "brainsait-audit"
database_id = "D1_AUDIT_DATABASE_ID"

# ── R2 Buckets ──
[[r2_buckets]]
binding = "DOCUMENTS"
bucket_name = "brainsait-documents"

[[r2_buckets]]
binding = "UPLOADS"
bucket_name = "brainsait-uploads"

[[r2_buckets]]
binding = "DATA_CONTRACTS"
bucket_name = "brainsait-data-contracts"

# ── Queues ──
[[queues.producers]]
binding = "EVENT_QUEUE"
queue = "brainsait-events"

[[queues.producers]]
binding = "NOTIFICATION_QUEUE"
queue = "brainsait-notifications"

[[queues.producers]]
binding = "DATA_SYNC_QUEUE"
queue = "brainsait-data-sync"

# ── Durable Objects ──
[[durable_objects.bindings]]
name = "RATE_LIMITER"
class_name = "RateLimiter"

[[durable_objects.bindings]]
name = "CHAT_ROOMS"
class_name = "ChatRoom"

[[durable_objects.bindings]]
name = "USAGE_TRACKER"
class_name = "AIUsageTracker"

# ── Analytics Engine ──
[[analytics_engine_datasets]]
binding = "API_ANALYTICS"
dataset = "brainsait_api_usage"

# ── Vectorize ──
[[vectorize]]
binding = "KNOWLEDGE_INDEX"
index_name = "brainsait-knowledge"

# ── AI Gateway ──
[ai]
binding = "AI"

# ── Environment Variables ──
[vars]
SERVICE_NAME = "brainsait-backend"
DOMAIN = "brainsait.com"
PLATFORM_VERSION = "2.0.0"

[env.production.vars]
NODE_ENV = "production"
LOG_LEVEL = "info"
CORS_ORIGINS = "https://brainsait.com,https://dashboard.brainsait.com,https://docs.brainsait.com"

[env.staging.vars]
NODE_ENV = "staging"
LOG_LEVEL = "debug"
CORS_ORIGINS = "https://staging.brainsait.com,http://localhost:3000"
