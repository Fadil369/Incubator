# Cloudflare Workers Configuration for BrainSAIT Platform

name = "brainsait-backend"
main = "packages/brainsait-backend/dist/worker.js"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# Account and route configuration
account_id = "d7b99530559ab4f2545e9bdc72a7ab9b"
workers_dev = true

# Custom domains for production
[env.production]
name = "brainsait-backend-production"
route = { pattern = "api.brainsait.org/*", zone_name = "brainsait.org" }

[env.staging]
name = "brainsait-backend-staging"
route = { pattern = "staging-api.brainsait.org/*", zone_name = "brainsait.org" }

[env.preview]
name = "brainsait-backend-preview"
workers_dev = true

# ── KV Namespaces (reusing existing) ──
[[kv_namespaces]]
binding = "SESSIONS"
id = "062eab539a7049c0b1e36049441a211d"

[[kv_namespaces]]
binding = "CACHE"
id = "079016c359c348e180724cdd76f29129"

[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "8c0682e8e21b4703b46fd1c1a3487ec0"

[[kv_namespaces]]
binding = "CONFIG"
id = "9503c6ef49a2447f9f3f65f8d0ce5bbf"

[[kv_namespaces]]
binding = "FEATURE_FLAGS"
id = "7e559b5bf3f84271b679db018f59e6d9"

[[kv_namespaces]]
binding = "STARTUP_REGISTRY"
id = "a6ac3b1a6086420e95b14e51e78bc288"

[[kv_namespaces]]
binding = "PARTNER_APPLICATIONS"
id = "b8fd4c2e1097531fae2d56c32a9b77cf"

# ── D1 Databases (reusing existing) ──
[[d1_databases]]
binding = "DB"
database_name = "brainsait-unified-api"
database_id = "925780db-b119-42f2-a3ca-2aea98712168"

[[d1_databases]]
binding = "AUDIT_LOG"
database_name = "brainsait-metrics"
database_id = "7b66d89d-7846-4c75-b7f5-5ffd2ea62629"

# ── R2 Buckets (reusing existing) ──
[[r2_buckets]]
binding = "DOCUMENTS"
bucket_name = "brainsait-documents"

[[r2_buckets]]
binding = "UPLOADS"
bucket_name = "brainsait-files"

[[r2_buckets]]
binding = "DATA_CONTRACTS"
bucket_name = "brainsait-storage"

# ── Queues (reusing existing) ──
[[queues.producers]]
binding = "EVENT_QUEUE"
queue = "brainsait-events"

[[queues.producers]]
binding = "NOTIFICATION_QUEUE"
queue = "brainsait-notifications"

[[queues.producers]]
binding = "CLAIMS_QUEUE"
queue = "brainsait-claims"

# ── Durable Objects ──
[[durable_objects.bindings]]
name = "RATE_LIMITER"
class_name = "RateLimiter"

[[durable_objects.bindings]]
name = "CHAT_ROOMS"
class_name = "ChatRoom"

[[durable_objects.bindings]]
name = "USAGE_TRACKER"
class_name = "AIUsageTracker"

[[migrations]]
tag = "v1"
new_classes = ["RateLimiter", "ChatRoom", "AIUsageTracker"]

# ── Analytics Engine ──
[[analytics_engine_datasets]]
binding = "API_ANALYTICS"
dataset = "brainsait_api_usage"

# ── Vectorize ──
[[vectorize]]
binding = "KNOWLEDGE_INDEX"
index_name = "brainsait-knowledge"

# ── AI Gateway ──
[ai]
binding = "AI"

# ── Build ──
[build]
command = "npm run build"
watch_paths = ["packages/**/*.ts", "packages/**/*.tsx"]

# ── Environment Variables ──
[vars]
SERVICE_NAME = "brainsait-backend"
DOMAIN = "brainsait.org"
PLATFORM_VERSION = "2.0.0"

[env.production.vars]
NODE_ENV = "production"
LOG_LEVEL = "info"
CORS_ORIGINS = "https://brainsait.org,https://dashboard.brainsait.org,https://docs.brainsait.org,https://portal.brainsait.org"
GITHUB_ORG = "brainsait-incubator"
# GITHUB_REPO: repo that hosts the partner-provision.yml workflow.
# Update to your org repo in production (e.g. "brainsait-incubator/incubator").
GITHUB_REPO = "Fadil369/Incubator"
FRONTEND_URL = "https://brainsait.org"

[env.staging.vars]
NODE_ENV = "staging"
LOG_LEVEL = "debug"
CORS_ORIGINS = "https://staging.brainsait.org,http://localhost:3000"
GITHUB_ORG = "brainsait-incubator"
FRONTEND_URL = "http://localhost:3000"
