# Cloudflare Workers Configuration for BrainSAIT Platform

name = "brainsait-backend"
main = "packages/brainsait-backend/dist/worker.js"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

account_id = "d7b99530559ab4f2545e9bdc72a7ab9b"
workers_dev = true

[env.production.routes]
patterns = ["api.brainsait.org/*"]
zone_name = "brainsait.org"

[env.production.vars]
NODE_ENV = "production"
API_BASE_URL = "https://api.brainsait.org"
FRONTEND_URL = "https://brainsait.org"
AI_SERVICE_URL = "https://ai.brainsait.org"
DOCS_SERVICE_URL = "https://docs.brainsait.org"
DOMAIN = "brainsait.org"
GITHUB_ORG = "brainsait-incubator"
GITHUB_REPO = "Fadil369/Incubator"

# KV Namespaces
[[kv_namespaces]]
binding = "SESSIONS"
id = "062eab539a7049c0b1e36049441a211d"

[[kv_namespaces]]
binding = "AI_CACHE"
id = "9201cf6a9b1143d8822250dc24e8c8ba"

[[kv_namespaces]]
binding = "RATE_LIMIT_STORE"
id = "8c0682e8e21b4703b46fd1c1a3487ec0"

# Durable Objects
[[durable_objects.bindings]]
name = "AI_USAGE_TRACKER"
class_name = "AIUsageTracker"

[[durable_objects.bindings]]
name = "CHAT_ROOMS"
class_name = "ChatRoom"

# R2 Storage
[[r2_buckets]]
binding = "DOCUMENTS"
bucket_name = "brainsait-documents"

[[r2_buckets]]
binding = "UPLOADS"
bucket_name = "brainsait-files"

[[r2_buckets]]
binding = "BACKUPS"
bucket_name = "brainsait-storage"

# D1 Database
[[d1_databases]]
binding = "DB"
database_name = "brainsait-unified-api"
database_id = "925780db-b119-42f2-a3ca-2aea98712168"

# Analytics Engine
[[analytics_engine_datasets]]
binding = "AI_ANALYTICS"
dataset = "brainsait_ai_usage"

[build]
command = "npm run build"
watch_paths = ["packages/**/*.ts", "packages/**/*.tsx"]

[env.development.vars]
NODE_ENV = "development"
API_BASE_URL = "http://localhost:5000"
FRONTEND_URL = "http://localhost:3000"
AI_SERVICE_URL = "http://localhost:5001"
DOCS_SERVICE_URL = "http://localhost:5002"
ENABLE_DEBUG = "true"

[env.staging.vars]
NODE_ENV = "staging"
API_BASE_URL = "https://staging-api.brainsait.org"
FRONTEND_URL = "https://staging.brainsait.org"
AI_SERVICE_URL = "https://staging-ai.brainsait.org"
DOCS_SERVICE_URL = "https://staging-docs.brainsait.org"
ENABLE_DEBUG = "false"

[env.preview.vars]
NODE_ENV = "preview"
API_BASE_URL = "https://preview-api.brainsait.org"
FRONTEND_URL = "https://preview.brainsait.org"
