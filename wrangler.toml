# Cloudflare Workers Configuration for BrainSAIT Platform
# Root-level wrangler config (used for local dev from monorepo root).
# The authoritative deploy config is packages/brainsait-backend/wrangler.toml.

name = "brainsait-backend"
main = "packages/brainsait-backend/dist/worker.js"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]
upload_source_maps = true

account_id = "d7b99530559ab4f2545e9bdc72a7ab9b"
workers_dev = true

[env.production]
name = "brainsait-backend-production"
routes = [
	{ pattern = "api.brainsait.org", custom_domain = true, zone_name = "brainsait.org" },
	{ pattern = "partners-api.brainsait.org", custom_domain = true, zone_name = "brainsait.org" }
]

