# AI Gateway
[ai]
binding = "AI"

[env.production.ai]
binding = "AI"

[env.staging.ai]
binding = "AI"

[env.preview.ai]
binding = "AI"

[build]
command = "npm run build:backend"
watch_dir = ["packages/brainsait-backend/src"]

[env.development.vars]
NODE_ENV = "development"
API_BASE_URL = "http://localhost:5000"
FRONTEND_URL = "http://localhost:3000"
AI_SERVICE_URL = "http://localhost:5001"
DOCS_SERVICE_URL = "http://localhost:5002"
ENABLE_DEBUG = "true"

[env.staging]
name = "brainsait-backend-staging"
routes = [
	{ pattern = "staging-api.brainsait.org", custom_domain = true, zone_name = "brainsait.org" },
	{ pattern = "staging-partners-api.brainsait.org", custom_domain = true, zone_name = "brainsait.org" }
]

[env.staging.vars]
NODE_ENV = "staging"
API_BASE_URL = "https://staging-api.brainsait.org"
FRONTEND_URL = "https://staging.brainsait.org"
AI_SERVICE_URL = "https://staging-ai.brainsait.org"
DOCS_SERVICE_URL = "https://staging-docs.brainsait.org"
ENABLE_DEBUG = "false"
GITHUB_ORG = "brainsait-incubator"
GITHUB_REPO = "Fadil369/Incubator"

[env.preview]
name = "brainsait-backend-preview"
workers_dev = true

[env.preview.vars]
NODE_ENV = "preview"
API_BASE_URL = "https://preview-api.brainsait.org"
FRONTEND_URL = "https://preview.brainsait.org"
GITHUB_ORG = "brainsait-incubator"
GITHUB_REPO = "Fadil369/Incubator"

[env.production.vars]
NODE_ENV = "production"
API_BASE_URL = "https://api.brainsait.org"
FRONTEND_URL = "https://brainsait.org"
AI_SERVICE_URL = "https://ai.brainsait.org"
DOCS_SERVICE_URL = "https://docs.brainsait.org"
DOMAIN = "brainsait.org"
CORS_ORIGINS = "https://brainsait.org,https://www.brainsait.org,https://dashboard.brainsait.org,https://docs.brainsait.org,https://portal.brainsait.org"
GITHUB_ORG = "brainsait-incubator"
GITHUB_REPO = "Fadil369/Incubator"
