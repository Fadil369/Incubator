# BrainSAIT Status Page — Cloudflare Pages
name = "brainsait-status"
compatibility_date = "2024-12-01"
pages_build_output_dir = "out"

[build]
command = "npm run build"
cwd = "pages/status-page"

[vars]
SERVICES = "api,auth,data-hub,ml,dashboard,docs,notifications"
CHECK_INTERVAL_SECONDS = "60"
BRAND_NAME = "BrainSAIT Incubator"
BRAND_COLOR = "#6366f1"

[[kv_namespaces]]
binding = "STATUS_DATA"
id = "079016c359c348e180724cdd76f29129"

[[kv_namespaces]]
binding = "UPTIME_HISTORY"
id = "9503c6ef49a2447f9f3f65f8d0ce5bbf"

[[d1_databases]]
binding = "DB"
database_name = "brainsait-metrics"
database_id = "7b66d89d-7846-4c75-b7f5-5ffd2ea62629"

[[analytics_engine_datasets]]
binding = "STATUS_ANALYTICS"
dataset = "brainsait_status"
