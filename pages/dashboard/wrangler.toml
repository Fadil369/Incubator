# BrainSAIT Dashboard — Cloudflare Pages (Next.js)
name = "brainsait-dashboard"
compatibility_date = "2024-12-01"
pages_build_output_dir = "packages/brainsait-frontend/.next"

[build]
command = "cd packages/brainsait-frontend && npm run build"
cwd = "."

[vars]
NEXT_PUBLIC_API_URL = "https://api.brainsait.org"
NEXT_PUBLIC_AUTH_URL = "https://auth.brainsait.org"
NEXT_PUBLIC_DATA_HUB_URL = "https://data-hub.brainsait.org"
NEXT_PUBLIC_ML_URL = "https://ml.brainsait.org"
NEXT_PUBLIC_WS_URL = "wss://notifications.brainsait.org/ws"
NEXT_PUBLIC_APP_NAME = "BrainSAIT Incubator"
NEXT_PUBLIC_DEFAULT_LOCALE = "en"
NEXT_PUBLIC_GITHUB_ORG = "brainsait-incubator"
NEXT_PUBLIC_PARTNER_APPLY_URL = "https://partners-api.brainsait.org/apply"
NEXT_PUBLIC_PORTAL_URL = "https://brainsait.org/portal"

[[kv_namespaces]]
binding = "ISR_CACHE"
id = "9503c6ef49a2447f9f3f65f8d0ce5bbf"

[[d1_databases]]
binding = "DB"
database_name = "brainsait-portal-db"
database_id = "999c96a4-b140-461b-8b00-90cff0ab489f"

[[r2_buckets]]
binding = "ASSETS"
bucket_name = "brainsait-files"

[env.production]
route = { pattern = "brainsait.org/*", zone_name = "brainsait.org" }
[env.production.vars]
NODE_ENV = "production"
NEXT_PUBLIC_API_URL = "https://api.brainsait.org"
NEXT_PUBLIC_PORTAL_URL = "https://brainsait.org/portal"
NEXT_PUBLIC_PARTNER_APPLY_URL = "https://partners-api.brainsait.org/apply"

[env.preview]
[env.preview.vars]
NODE_ENV = "preview"
NEXT_PUBLIC_API_URL = "https://staging-api.brainsait.org"
NEXT_PUBLIC_PORTAL_URL = "http://localhost:3000/portal"
NEXT_PUBLIC_PARTNER_APPLY_URL = "https://partners-api.brainsait.org/apply"
